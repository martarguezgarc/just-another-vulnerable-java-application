# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow lets you generate SLSA provenance file for your project.
# The generation satisfies level 3 for the provenance requirements - see https://slsa.dev/spec/v0.1/requirements
# The project is an initiative of the OpenSSF (openssf.org) and is developed at
# https://github.com/slsa-framework/slsa-github-generator.
# The provenance file can be verified using https://github.com/slsa-framework/slsa-verifier.
# For more information about SLSA and how it improves the supply-chain, visit slsa.dev.

name: SLSA generic generator
on:
  workflow_dispatch:
  release:
    types: [created]
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
      artifact-name: ${{ steps.build.outputs.artifact-name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
        
      # ========================================================
      #
      # Step 1: Build your artifacts.
      #
      # ========================================================
      - name: Build with Maven
        id: build
        run: |
          mvn clean package -DskipTests
          ARTIFACT_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "artifact-name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
      
      - name: Generate subject digest for provenance
        id: hash
        run: |
          ARTIFACT_PATH="target/${{ steps.build.outputs.artifact-name }}"
          DIGEST=$(sha256sum "$ARTIFACT_PATH" | base64 -w0)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-artifact
          path: target/${{ steps.build.outputs.artifact-name }}

  # ========================================================
  #
  # Step 2: Add a step to generate the provenance subjects
  #         as shown below. Update the sha256 sum arguments
  #         to include all binaries that you generate
  #         provenance for.
  #
  # ========================================================
  provenance:
    needs: [build]
    permissions:
      actions: read   # To read the workflow path.
      id-token: write # To sign the provenance.
      contents: write # To add assets to a release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true # Optional: Upload to a new release
